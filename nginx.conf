map $http_origin $cors_origin {
    default  "";
    ~^https://ai-solutions-shell-production\.up\.railway\.app$  $http_origin;
    ~^https://aisolutionspl\.up\.railway\.app$  $http_origin;
    ~^https://aisolutionspl\.com$                               $http_origin;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache remoteEntry.js — it's the MFE entry point and has no hash in its filename
    location = /remoteEntry.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
        try_files $uri =404;
    }

    # Cache hashed assets forever — new deploy = new filename, so no stale risk
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;

        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
    }
}
