<div class="contact-staff-sec-wrapper">
  <div class="actions">
      <p-button
          icon="pi pi-arrow-left"
          label="Back"
          severity="secondary"
          routerLink="/contact/staff"
      ></p-button>
  </div>

  @if (loadingState() === LoadingState.Loading) {
    <div class="spinner-wrapper">
      <p-progressSpinner strokeWidth="4" fill="transparent" />
    </div>
  } @else if (loadingState() === LoadingState.Success) {
    <remote-component
      [remoteEntry]="uiMfeUrl"
      [exposedModule]="'./Form'"
      [exportName]="'FormComponent'"
      [inputs]="{ config: formConfig() }"
      (outputs)="onRemoteOutput($event)"
    ></remote-component>
  } 

</div>
